<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <style>
   * {
     font-family: "Poppins", sans-serif;
     padding: 0;
     margin: 0;
   }
  main {
    padding: 2em;
  }
    section, div {
      font-size: 1.5rem;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    header {
      padding: 0.5em;
    }
    h1 {
      text-align: center;
    }
    
    button {
      font-size: 1.5rem;
      background-color: green;
      color: white;
      margin: 1em 0 1em 0;
      border: none;
      padding: 0.5em;
      border-radius: 0.3em;
    }
    
    #answer {
      display: none;
    }
  
    video {
      height: 60vh;
      border: 2px solid green;
      border-radius: 10px;
      object-fit: cover;
    }
    #local {
      position: absolute;
      height: 10vh;
      width: 10vh;
      bottom: 0;
      right: 0;
    }
  </style>
</head>

<body>
  <header>
  <h1>Video Calling system, engineered by DOMINIC JUMA.</h1>
  </header>
  <main>
    <section>
    <video id="remote">
      
    </video>
       <video id="local" muted>
      
    </video>
        </section>
        <div>
    <button id="call">call</button>
    <p id="call-display"></p>
    <button id="answer">answer</button>
        </div>

  </main>
  <script>
    const ws = new WebSocket("wss://call-pt7x.onrender.com");
const callbtn = document.getElementById("call");
const answerBtn = document.getElementById("answer");
const localVideo = document.querySelector("#local");
const remoteVideo = document.querySelector("#remote");
const callDisplay = document.getElementById("call-display");

const configuration = {
  iceServers: [
    { urls: "stun:stun.l.google.com:19302" }
  ]
};

const pc = new RTCPeerConnection(configuration);

// SET USER ID
if (!localStorage.getItem("id")) {
  const setId = prompt("Set your identity (1–10)");
  localStorage.setItem("id", setId);
}

// WS CONNECTED
ws.onopen = () => {
  console.log("ws connected");
  ws.send(JSON.stringify({
    type: "id",
    id: localStorage.getItem("id")
  }));
};

// CALL BUTTON
callbtn.onclick = async () => {
  const targetId = prompt("Enter user id");

  if (!targetId) {
    alert("user id required");
    return;
  }

  localStorage.setItem("targetId", targetId);

  callbtn.setAttribute("disabled", "true");
  callbtn.innerText = "calling...";

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  ws.send(JSON.stringify({
    type: "offer",
    offer: pc.localDescription,
    to: targetId,
    from: localStorage.getItem("id")
  }));
};

// ANSWER BUTTON
answerBtn.onclick = async () => {
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);

  ws.send(JSON.stringify({
    type: "answer",
    answer: pc.localDescription,
    to: localStorage.getItem("callerId"),
    from: localStorage.getItem("id")
  }));

  answerBtn.style.display = "none";
};

// WS MESSAGE HANDLER
ws.onmessage = async (e) => {
  const data = JSON.parse(e.data);

  // OFFER RECEIVED
  if (data.type === "offer") {
    answerBtn.style.display = "block";
    callbtn.style.display = "none";
    callDisplay.innerText = "Incoming call...";

    await pc.setRemoteDescription(data.offer);
    localStorage.setItem("callerId", data.from);
  }

  // ANSWER RECEIVED
  if (data.type === "answer") {
    await pc.setRemoteDescription(data.answer);
    callbtn.style.display = "none";
  }

  // ICE CANDIDATE RECEIVED
  if (data.type === "candidate") {
    try {
      if (pc.remoteDescription) {
        await pc.addIceCandidate(data.candidate);
      }
    } catch (err) {
      console.error("ICE error:", err);
    }
  }
};

// SEND ICE CANDIDATES
pc.onicecandidate = (e) => {
  if (e.candidate && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({
      type: "candidate",
      candidate: e.candidate,
      to: localStorage.getItem("callerId") || localStorage.getItem("targetId"),
      from: localStorage.getItem("id")
    }));
  }
};

// GET CAMERA + MIC
async function camera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user" },
    audio: true
  });

  localVideo.srcObject = stream;

  stream.getTracks().forEach(track => {
    pc.addTrack(track, stream);
  });
}

// RECEIVE REMOTE STREAM
pc.ontrack = (e) => {
  remoteVideo.srcObject = e.streams[0];
};

camera();
  </script>
</body>

</html>
