<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Video Call</title>

<style>
* { font-family: Poppins; margin:0; padding:0; }
main { padding: 2em; }
section { position: relative; display:flex; flex-direction:column; }
video {
  height:60vh;
  border:2px solid green;
  border-radius:10px;
  object-fit:cover;
}
#local {
  position:absolute;
  height:10vh;
  width:10vh;
  bottom:0;
  right:0;
}
button {
  font-size:1.2rem;
  margin:1em 0;
  padding:0.5em;
  background:green;
  color:white;
  border:none;
}
#answer { display:none; }
</style>
</head>

<body>

<h2>Video Calling System. Engineered by dominic juma</h2>

<main>
<section>
  <video id="remote" autoplay playsinline></video>
  <video id="local" autoplay playsinline muted></video>
</section>

<button id="call">Call</button>
<button id="answer">Answer</button>
<p id="status"></p>
</main>

<script>
const ws = new WebSocket("wss://call-pt7x.onrender.com");

const callBtn = document.getElementById("call");
const answerBtn = document.getElementById("answer");
const localVideo = document.getElementById("local");
const remoteVideo = document.getElementById("remote");
const status = document.getElementById("status");

let pc;
let localStream;
let currentPeer = null;
let pendingCandidates = [];

// USER ID
if (!localStorage.getItem("id")) {
  localStorage.setItem("id", prompt("Enter your ID (1-10)"));
}

// INIT PEER CONNECTION
function createPC() {
  pc = new RTCPeerConnection({
  iceServers: [
      {
        urls: "stun:stun.relay.metered.ca:80",
      },
      {
        urls: "turn:global.relay.metered.ca:80",
        username: "59a85f32d0ed831bdb30ba3f",
        credential: "1Eup6H0Wjz76QcQR",
      },
      {
        urls: "turn:global.relay.metered.ca:80?transport=tcp",
        username: "59a85f32d0ed831bdb30ba3f",
        credential: "1Eup6H0Wjz76QcQR",
      },
      {
        urls: "turn:global.relay.metered.ca:443",
        username: "59a85f32d0ed831bdb30ba3f",
        credential: "1Eup6H0Wjz76QcQR",
      },
      {
        urls: "turns:global.relay.metered.ca:443?transport=tcp",
        username: "59a85f32d0ed831bdb30ba3f",
        credential: "1Eup6H0Wjz76QcQR",
      },
  ],
});
                      

  pc.onicecandidate = (e) => {
    if (e.candidate && ws.readyState === 1) {
      ws.send(JSON.stringify({
        type: "candidate",
        candidate: e.candidate,
        to: currentPeer,
        from: localStorage.getItem("id")
      }));
    }
  };

  pc.ontrack = (e) => {
    remoteVideo.srcObject = e.streams[0];
  };

  if (localStream) {
    localStream.getTracks().forEach(track => {
      pc.addTrack(track, localStream);
    });
  }
}

// CAMERA
async function initMedia() {
  localStream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: true
  });
  localVideo.srcObject = localStream;
}

// WS CONNECT
ws.onopen = () => {
  ws.send(JSON.stringify({
    type: "id",
    id: localStorage.getItem("id")
  }));
};

// CALL
callBtn.onclick = async () => {
  currentPeer = prompt("Enter target ID");
  if (!currentPeer) return;

  await initMedia();
  createPC();

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  ws.send(JSON.stringify({
    type: "offer",
    offer: pc.localDescription,
    to: currentPeer,
    from: localStorage.getItem("id")
  }));

  status.innerText = "Calling...";
};

// ANSWER
answerBtn.onclick = async () => {
  answerBtn.style.display = "none";

  await initMedia();
  createPC();

  await pc.setRemoteDescription(window.incomingOffer);

  // Add queued ICE
  for (const c of pendingCandidates) {
    await pc.addIceCandidate(c);
  }
  pendingCandidates = [];

  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);

  ws.send(JSON.stringify({
    type: "answer",
    answer: pc.localDescription,
    to: currentPeer,
    from: localStorage.getItem("id")
  }));

  status.innerText = "Call connected";
};

// RECEIVE SIGNALS
ws.onmessage = async (e) => {
  const data = JSON.parse(e.data);

  if (data.type === "offer") {
    currentPeer = data.from;
    window.incomingOffer = data.offer;

    answerBtn.style.display = "block";
    status.innerText = "Incoming call...";
  }

  if (data.type === "answer") {
    await pc.setRemoteDescription(data.answer);
    status.innerText = "Call connected";
  }

  if (data.type === "candidate") {
    if (pc && pc.remoteDescription) {
      await pc.addIceCandidate(data.candidate);
    } else {
      pendingCandidates.push(data.candidate);
    }
  }
};
</script>

</body>
</html>
